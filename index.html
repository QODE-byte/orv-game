<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무당기(巫堂記) — 신들이 지켜보는 이야기</title>
<meta name="description" content="신내림을 거부해온 취준생이 신들의 시험 앞에 선다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#fbbf24;--purple:#c084fc;--teal:#67e8f9;--red:#f87171;
  --bg:#08060f;--text:#e8e0d8;--muted:rgba(255,255,255,.4);
}
html,body{
  width:100%;min-height:100vh;background:var(--bg);
  font-family:'Noto Serif KR','Malgun Gothic',serif;
  color:var(--text);overflow:hidden;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes twinkle{0%,100%{opacity:.08}50%{opacity:.35}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes deityIn{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes deityOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
@keyframes mindamIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

#app{max-width:780px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}
#stars-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#c084fc;animation:twinkle 4s ease-in-out infinite;}

/* HUD */
#hud{
  position:sticky;top:0;z-index:100;padding:10px 16px;
  background:linear-gradient(180deg,rgba(8,6,15,.98) 80%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(192,132,252,.12);min-height:44px;
}
#hud-left{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gold);letter-spacing:.1em;font-weight:700;}
#hud-stats{display:flex;align-items:center;gap:10px;}
#hud-trust-pills{display:flex;align-items:center;gap:10px;}
.stat-pill{display:flex;align-items:center;gap:4px;font-size:10px;}
.stat-track{width:36px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;}
.stat-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.seolhwa-tag{font-size:11px;color:var(--purple);letter-spacing:.04em;}
.coin-tag{font-size:11px;padding:2px 8px;border:1px solid rgba(103,232,249,.25);border-radius:3px;background:rgba(103,232,249,.05);color:var(--teal);}
#ep-info{font-size:10px;color:rgba(255,255,255,.18);letter-spacing:.08em;}
#menu-btn{
  background:none;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4);
  font-size:14px;padding:4px 8px;border-radius:3px;cursor:pointer;
  transition:all .15s;font-family:inherit;
}
#menu-btn:hover{border-color:var(--gold);color:var(--gold);}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;position:relative;z-index:10;}
#scene-bg{flex:1;min-height:180px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.bg-overlay{position:absolute;inset:0;transition:background 1.2s ease;}
.bg-shrine{background:radial-gradient(ellipse 70% 50% at 50% 30%,#1a0a2e 0%,#08060f 65%);}
.bg-dark{background:radial-gradient(ellipse 70% 50% at 50% 30%,#120820 0%,#08060f 65%);}
.bg-subway{background:radial-gradient(ellipse 70% 50% at 50% 30%,#0a1020 0%,#08060f 65%);}
.bg-dream{background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a0f30 0%,#08060f 50%);}
.scene-illus{position:relative;z-index:1;text-align:center;padding:40px 24px;opacity:.15;font-size:72px;user-select:none;pointer-events:none;}

/* DIALOG */
#dialog-wrap{
  position:relative;z-index:10;
  border-top:1px solid rgba(192,132,252,.12);
  background:linear-gradient(180deg,rgba(8,6,15,.72) 0%,rgba(8,6,15,.97) 100%);
  padding:22px 26px 18px;cursor:pointer;min-height:164px;
}
#speaker-name{
  display:inline-flex;align-items:center;font-size:12px;font-weight:700;letter-spacing:.1em;
  padding:3px 12px;border:1px solid;border-radius:2px;margin-bottom:14px;background:rgba(0,0,0,.5);
  transition:color .3s,border-color .3s;
}
#dialog-text{font-size:15px;line-height:2;color:var(--text);white-space:pre-wrap;min-height:60px;}
#cursor-blink{display:inline;animation:blink .7s step-end infinite;color:var(--gold);}
#skip-hint{font-size:10px;color:rgba(255,255,255,.14);text-align:right;margin-top:8px;letter-spacing:.05em;}

/* CHOICES */
#choices-wrap{position:relative;z-index:10;padding:6px 26px 28px;background:rgba(8,6,15,.97);display:none;flex-direction:column;gap:8px;}
.choice-btn{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:12px 16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);
  border-radius:3px;color:#b5b0a8;font-size:14px;cursor:pointer;font-family:inherit;
  letter-spacing:.02em;transition:background .15s,border-color .15s,color .15s,transform .12s;
  animation:slideIn .25s ease both;
}
.choice-btn:hover:not(:disabled){background:rgba(192,132,252,.08);border-color:var(--purple);color:#e9d5ff;transform:translateX(5px);}
.choice-btn:disabled.choice-locked-disabled{opacity:.38;cursor:not-allowed;}
.choice-arrow{color:var(--gold);font-size:10px;flex-shrink:0;}
.choice-arrow.locked-afford{color:#fbbf24;}
.choice-arrow.locked-broke{color:rgba(255,255,255,.25);}
.choice-fx{margin-left:auto;font-size:10px;color:rgba(255,255,255,.22);letter-spacing:.05em;flex-shrink:0;}
.choice-lock-cost{margin-left:auto;font-size:10px;color:#fbbf24;letter-spacing:.05em;flex-shrink:0;padding:2px 6px;border:1px solid rgba(251,191,36,.3);border-radius:2px;}
.choice-lock-cost.broke{color:rgba(255,255,255,.2);border-color:rgba(255,255,255,.1);}

/* DEITY POPUP */
#constellation-popup{
  display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:200;
  max-width:420px;width:90%;padding:14px 20px;
  background:linear-gradient(135deg,rgba(192,132,252,.12) 0%,rgba(251,191,36,.08) 100%);
  border:1px solid rgba(192,132,252,.25);border-radius:6px;backdrop-filter:blur(8px);
  animation:deityIn .4s ease;text-align:center;
}
#constellation-popup.hiding{animation:deityOut .3s ease forwards;}
.const-msg{font-size:12px;color:var(--purple);line-height:1.7;}
.const-coin{font-size:11px;color:var(--gold);margin-top:6px;}
.const-favor{font-size:10px;color:rgba(255,255,255,.28);margin-top:4px;}

/* MINDAM POPUP (설화 팝업) */
#seolhwa-popup{
  display:none;position:fixed;inset:0;z-index:300;
  align-items:center;justify-content:center;
  background:rgba(8,6,15,.88);backdrop-filter:blur(6px);
  animation:mindamIn .5s ease;
}
.seolhwa-popup-inner{text-align:center;padding:40px;}
.seolhwa-popup-icon{font-size:64px;margin-bottom:16px;}
.seolhwa-popup-label{font-size:10px;letter-spacing:.3em;color:var(--gold);margin-bottom:8px;}
.seolhwa-popup-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;}
.seolhwa-popup-desc{font-size:13px;color:var(--purple);line-height:1.8;max-width:380px;}

/* TITLE */
#title-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:48px 24px;text-align:center;position:relative;z-index:10;
  animation:fadeUp .6s ease;
}
.title-label{font-size:10px;letter-spacing:.35em;color:var(--gold);margin-bottom:14px;opacity:.7;}
.title-main{font-size:clamp(40px,9vw,72px);font-weight:900;line-height:1.08;color:#fff;margin-bottom:8px;letter-spacing:-.02em;text-shadow:0 0 80px rgba(192,132,252,.2);}
.title-sub{font-size:16px;font-weight:400;color:var(--purple);margin-bottom:6px;letter-spacing:.05em;}
.title-en{font-size:11px;letter-spacing:.18em;color:rgba(255,255,255,.22);margin-bottom:28px;}
.title-divider{width:40px;height:1px;background:rgba(192,132,252,.35);margin:0 auto 24px;}
.title-quote{font-size:14px;line-height:2;color:rgba(255,255,255,.45);margin-bottom:40px;font-style:italic;}
.orv-btn{
  padding:13px 42px;background:transparent;border:1px solid var(--purple);color:var(--purple);
  font-size:13px;letter-spacing:.12em;cursor:pointer;border-radius:2px;font-family:inherit;
  transition:background .2s,box-shadow .2s,transform .1s;
}
.orv-btn:hover{background:rgba(192,132,252,.1);box-shadow:0 0 24px rgba(192,132,252,.15);}
.orv-btn:active{transform:scale(.98);}
.char-select-title{font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.3);margin-bottom:14px;margin-top:28px;}
.char-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;}
.char-card{
  padding:14px 18px;border:1px solid rgba(255,255,255,.08);border-radius:4px;
  background:rgba(255,255,255,.02);cursor:pointer;min-width:130px;text-align:center;
  transition:all .2s;position:relative;
}
.char-card:hover,.char-card.selected{border-color:var(--purple);background:rgba(192,132,252,.07);transform:translateY(-2px);}
.char-card-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.char-card-desc{font-size:11px;color:rgba(255,255,255,.38);line-height:1.5;white-space:pre-line;}
.char-badge{position:absolute;top:-6px;right:-6px;font-size:9px;padding:2px 6px;border-radius:2px;background:rgba(103,232,249,.12);border:1px solid rgba(103,232,249,.28);color:var(--teal);}
.legal-note{margin-top:20px;font-size:10px;color:rgba(255,255,255,.14);}

/* CLEAR */
#clear-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:48px 24px;text-align:center;position:relative;z-index:10;
  animation:fadeUp .5s ease;
}
.clear-star{font-size:40px;color:var(--gold);margin-bottom:18px;animation:pulse 2.5s ease infinite;}
.clear-ep{font-size:10px;letter-spacing:.25em;color:rgba(255,255,255,.25);margin-bottom:8px;}
.clear-title{font-size:26px;font-weight:700;color:#fff;margin-bottom:22px;}
.clear-msg{font-size:13px;line-height:2.1;color:var(--purple);margin-bottom:28px;white-space:pre-wrap;max-width:440px;font-style:italic;}
.stats-grid{display:flex;gap:28px;margin-bottom:36px;}
.stat-card{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.4);}
.stat-val{font-size:24px;font-weight:700;}
.ending-label{font-size:11px;letter-spacing:.1em;padding:4px 14px;border-radius:2px;margin-bottom:24px;}
.clear-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:250;
  align-items:center;justify-content:center;
  background:rgba(8,6,15,.82);backdrop-filter:blur(4px);
}
.modal-content{
  width:90%;max-width:520px;max-height:80vh;
  background:#0d0b18;border:1px solid rgba(192,132,252,.18);border-radius:8px;
  display:flex;flex-direction:column;overflow:hidden;
  animation:fadeUp .3s ease;
}
.modal-tabs-wrap{display:flex;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.06);padding:0 4px;}
.modal-tab{
  flex-shrink:0;padding:10px 14px;font-size:11px;letter-spacing:.04em;
  background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;
  font-family:inherit;border-bottom:2px solid transparent;transition:all .15s;
}
.modal-tab:hover{color:rgba(255,255,255,.65);}
.modal-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.modal-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
.modal-empty{text-align:center;color:rgba(255,255,255,.28);padding:36px 0;font-size:13px;}
.modal-card{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);
  border-radius:4px;
}
.modal-card.locked{opacity:.45;}
.modal-card.seolhwa-owned{border-color:rgba(192,132,252,.28);background:rgba(192,132,252,.04);}
.modal-card-icon{font-size:22px;flex-shrink:0;width:34px;text-align:center;}
.modal-card-info{flex:1;min-width:0;}
.modal-card-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.modal-card-desc{font-size:11px;color:rgba(255,255,255,.38);line-height:1.5;}
.modal-card-btn{
  flex-shrink:0;padding:5px 10px;font-size:11px;
  background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);
  color:var(--gold);border-radius:3px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.modal-card-btn:hover{background:rgba(251,191,36,.15);}
.modal-card-btn.disabled{opacity:.28;cursor:not-allowed;}
.const-bar-wrap{width:100%;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin:4px 0;}
.const-bar{height:100%;border-radius:2px;transition:width .5s;}
.modal-close-btn{
  padding:10px;text-align:center;font-size:12px;letter-spacing:.1em;
  background:none;border:none;border-top:1px solid rgba(255,255,255,.06);
  color:rgba(255,255,255,.35);cursor:pointer;font-family:inherit;transition:color .15s;
}
.modal-close-btn:hover{color:var(--gold);}

/* FOOTER */
#footer-bar{text-align:center;padding:12px;font-size:10px;color:rgba(255,255,255,.1);border-top:1px solid rgba(255,255,255,.04);position:relative;z-index:10;}

/* MOBILE */
@media(max-width:520px){
  #dialog-wrap{padding:18px 18px 14px;}
  #choices-wrap{padding:4px 18px 22px;}
  .char-cards{gap:8px;}
  .char-card{min-width:110px;padding:12px 14px;}
  #hud{padding:8px 12px;}
  .stat-track{width:28px;}
  .modal-content{width:95%;max-height:85vh;}
  .stats-grid{gap:18px;}
}
</style>
</head>
<body>

<div id="stars-layer"></div>

<!-- 신위 팝업 -->
<div id="constellation-popup">
  <div class="const-msg" id="const-msg"></div>
  <div class="const-coin" id="const-coin"></div>
  <div class="const-favor" id="const-favor"></div>
</div>

<!-- 민담 팝업 -->
<div id="seolhwa-popup">
  <div class="seolhwa-popup-inner">
    <div class="seolhwa-popup-label">민담 획득</div>
    <div class="seolhwa-popup-icon" id="seolhwa-popup-icon"></div>
    <div class="seolhwa-popup-name" id="seolhwa-popup-name"></div>
    <div class="seolhwa-popup-desc" id="seolhwa-popup-desc"></div>
  </div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-content">
    <div class="modal-tabs-wrap" id="modal-tabs"></div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-close-btn" id="modal-close-btn">닫기</button>
  </div>
</div>

<div id="app">

  <!-- 타이틀 -->
  <div id="title-screen">
    <div class="title-label">MUDANGGI — 巫堂記</div>
    <div class="title-main">무당기</div>
    <div class="title-sub">巫堂記</div>
    <div class="title-en">신들이 지켜보는 이야기</div>
    <div class="title-divider"></div>
    <div class="title-quote">"신내림을 거부해온 취준생이<br>신들의 시험 앞에 선다."</div>
    <div class="char-select-title">-- 주인공 선택 --</div>
    <div class="char-cards" id="char-cards"></div>
    <button class="orv-btn" id="start-btn">이야기 시작하기</button>
    <div class="true-end-hint" id="true-end-hint" style="display:none"></div>
    <div class="legal-note">오리지널 IP . 한국 무속신앙 기반 선택형 비주얼노벨 . 프로토타입 v0.1</div>
  </div>

  <!-- 게임 -->
  <div id="game-screen" style="display:none;flex-direction:column;flex:1;">
    <div id="hud">
      <div id="hud-left">무당기</div>
      <div id="ep-info">1막 · 귀가</div>
      <div id="hud-stats">
        <div id="hud-trust-pills"></div>
        <span class="seolhwa-tag" id="val-seolhwa">📜 0</span>
        <span class="coin-tag" id="val-coin">🔮 0</span>
        <button id="menu-btn">☰</button>
      </div>
    </div>
    <div id="main">
      <div id="scene-bg">
        <div class="bg-overlay bg-dark" id="bg-overlay"></div>
        <div class="scene-illus" id="scene-illus">🕯️</div>
      </div>
      <div id="dialog-wrap" onclick="skipTyping()">
        <div id="speaker-name"></div>
        <div id="dialog-text"></div>
        <div id="skip-hint">클릭하여 건너뛰기</div>
      </div>
      <div id="choices-wrap"></div>
    </div>
    <div id="footer-bar">무당기(巫堂記) · 1막 프로토타입 · 오리지널 IP</div>
  </div>

  <!-- 클리어 -->
  <div id="clear-screen">
    <div class="clear-star" id="clear-star">◈</div>
    <div class="clear-ep" id="clear-ep-label">1막</div>
    <div class="clear-title" id="clear-title">클리어!</div>
    <div class="clear-msg" id="clear-msg"></div>
    <div id="ending-badge" class="ending-label"></div>
    <div class="stats-grid">
      <div class="stat-card">
        <span style="color:var(--purple)">인연</span>
        <span class="stat-val" style="color:var(--purple)" id="final-trust">0</span>
      </div>
      <div class="stat-card">
        <span style="color:var(--gold)">민담</span>
        <span class="stat-val" style="color:var(--gold)" id="final-seolhwa">0</span>
      </div>
      <div class="stat-card">
        <span style="color:var(--teal)">신기</span>
        <span class="stat-val" style="color:var(--teal)" id="final-coin">0</span>
      </div>
    </div>
    <div class="clear-buttons">
      <button class="orv-btn" id="next-ep-btn" style="display:none;">2막으로 ▶</button>
      <button class="orv-btn" id="retry-btn">처음부터 다시</button>
    </div>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/scenes.js"></script>
<script src="js/engine.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
