<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전지적 독자시점 — 팬게임</title>
<meta name="description" content="나는 이 세계의 결말을 알고 있는 유일한 독자였다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f59e0b;--red:#ef4444;--purple:#a78bfa;--cyan:#22d3ee;
  --bg:#06080f;--text:#e0dbd2;--muted:rgba(255,255,255,.45);
}
html,body{
  width:100%;min-height:100vh;background:var(--bg);
  font-family:'Noto Serif KR','Malgun Gothic',serif;
  color:var(--text);overflow:hidden;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.45}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes constellationIn{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes constellationOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
@keyframes seolhwaIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* -- LAYOUT -- */
#app{max-width:780px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}
#stars-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s ease-in-out infinite;}

/* -- HUD -- */
#hud{
  position:sticky;top:0;z-index:100;padding:10px 16px;
  background:linear-gradient(180deg,rgba(6,8,15,.98) 80%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(245,158,11,.1);min-height:44px;
}
#hud-left{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gold);letter-spacing:.08em;font-weight:700;}
#hud-stats{display:flex;align-items:center;gap:10px;}
#hud-trust-pills{display:flex;align-items:center;gap:10px;}
.stat-pill{display:flex;align-items:center;gap:4px;font-size:10px;}
.stat-track{width:36px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;}
.stat-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.seolhwa-tag{font-size:11px;color:var(--purple);letter-spacing:.04em;}
.coin-tag{font-size:11px;padding:2px 8px;border:1px solid rgba(34,211,238,.3);border-radius:3px;background:rgba(34,211,238,.06);color:var(--cyan);}
#ep-info{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.1em;}
#menu-btn{
  background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);
  font-size:14px;padding:4px 8px;border-radius:3px;cursor:pointer;
  transition:all .15s;font-family:inherit;
}
#menu-btn:hover{border-color:var(--gold);color:var(--gold);}

/* -- MAIN -- */
#main{flex:1;display:flex;flex-direction:column;position:relative;z-index:10;}
#scene-bg{flex:1;min-height:180px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.bg-overlay{position:absolute;inset:0;transition:background 1.2s ease;}
.bg-subway{background:radial-gradient(ellipse 70% 50% at 50% 30%,#0a1628 0%,#06080f 65%);}
.bg-dark{background:radial-gradient(ellipse 70% 50% at 50% 30%,#1a0a2e 0%,#06080f 65%);}
.bg-city{background:radial-gradient(ellipse 70% 50% at 50% 30%,#1a1408 0%,#06080f 65%);}
.bg-battle{background:radial-gradient(ellipse 70% 50% at 50% 30%,#2e0a0a 0%,#06080f 65%);}
.bg-palace{background:radial-gradient(ellipse 70% 50% at 50% 30%,#1a0a2e 0%,#0f0520 65%);}
.bg-final{background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a1a3e 0%,#06080f 50%);}
.scene-illus{position:relative;z-index:1;text-align:center;padding:40px 24px;opacity:.18;font-size:72px;user-select:none;pointer-events:none;}

/* -- DIALOG -- */
#dialog-wrap{
  position:relative;z-index:10;
  border-top:1px solid rgba(245,158,11,.15);
  background:linear-gradient(180deg,rgba(6,8,15,.72) 0%,rgba(6,8,15,.97) 100%);
  padding:22px 26px 18px;cursor:pointer;min-height:164px;
}
#speaker-name{
  display:inline-flex;align-items:center;font-size:12px;font-weight:700;letter-spacing:.1em;
  padding:3px 12px;border:1px solid;border-radius:2px;margin-bottom:14px;background:rgba(0,0,0,.5);
  transition:color .3s,border-color .3s;
}
#dialog-text{font-size:15px;line-height:1.9;color:var(--text);white-space:pre-wrap;min-height:60px;}
#cursor-blink{display:inline;animation:blink .7s step-end infinite;color:var(--gold);}
#skip-hint{font-size:10px;color:rgba(255,255,255,.16);text-align:right;margin-top:8px;letter-spacing:.05em;}

/* -- CHOICES -- */
#choices-wrap{position:relative;z-index:10;padding:6px 26px 28px;background:rgba(6,8,15,.97);display:none;flex-direction:column;gap:8px;}
.choice-btn{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:12px 16px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.1);
  border-radius:3px;color:#b5b0a8;font-size:14px;cursor:pointer;font-family:inherit;
  letter-spacing:.02em;transition:background .15s,border-color .15s,color .15s,transform .12s;
  animation:slideIn .25s ease both;
}
.choice-btn:hover{background:rgba(245,158,11,.1);border-color:var(--gold);color:#fcd34d;transform:translateX(5px);}
.choice-arrow{color:var(--gold);font-size:10px;flex-shrink:0;}
.choice-fx{margin-left:auto;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.05em;flex-shrink:0;}

/* -- CONSTELLATION POPUP -- */
#constellation-popup{
  display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:200;
  max-width:420px;width:90%;padding:14px 20px;
  background:linear-gradient(135deg,rgba(167,139,250,.15) 0%,rgba(34,211,238,.1) 100%);
  border:1px solid rgba(167,139,250,.3);border-radius:6px;backdrop-filter:blur(8px);
  animation:constellationIn .4s ease;text-align:center;
}
#constellation-popup.hiding{animation:constellationOut .3s ease forwards;}
.const-msg{font-size:12px;color:var(--purple);line-height:1.7;}
.const-coin{font-size:11px;color:var(--cyan);margin-top:6px;}
.const-favor{font-size:10px;color:rgba(255,255,255,.3);margin-top:4px;}

/* -- SEOLHWA POPUP -- */
#seolhwa-popup{
  display:none;position:fixed;inset:0;z-index:300;
  align-items:center;justify-content:center;
  background:rgba(6,8,15,.85);backdrop-filter:blur(6px);
  animation:seolhwaIn .5s ease;
}
.seolhwa-popup-inner{text-align:center;padding:40px;}
.seolhwa-popup-icon{font-size:64px;margin-bottom:16px;}
.seolhwa-popup-label{font-size:10px;letter-spacing:.3em;color:var(--gold);margin-bottom:8px;}
.seolhwa-popup-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;}
.seolhwa-popup-desc{font-size:13px;color:var(--purple);line-height:1.8;}

/* -- TITLE -- */
#title-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:48px 24px;text-align:center;position:relative;z-index:10;
  animation:fadeUp .6s ease;
}
.title-label{font-size:10px;letter-spacing:.35em;color:var(--gold);margin-bottom:14px;opacity:.75;}
.title-main{font-size:clamp(40px,9vw,72px);font-weight:900;line-height:1.08;color:#fff;margin-bottom:8px;letter-spacing:-.02em;text-shadow:0 0 80px rgba(245,158,11,.2);}
.title-en{font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.28);margin-bottom:30px;}
.title-divider{width:40px;height:1px;background:rgba(245,158,11,.4);margin:0 auto 28px;}
.title-quote{font-size:14px;line-height:2;color:rgba(255,255,255,.5);margin-bottom:48px;font-style:italic;}
.orv-btn{
  padding:13px 42px;background:transparent;border:1px solid var(--gold);color:var(--gold);
  font-size:13px;letter-spacing:.12em;cursor:pointer;border-radius:2px;font-family:inherit;
  transition:background .2s,box-shadow .2s,transform .1s;
}
.orv-btn:hover{background:rgba(245,158,11,.1);box-shadow:0 0 24px rgba(245,158,11,.18);}
.orv-btn:active{transform:scale(.98);}
.char-select-title{font-size:12px;letter-spacing:.12em;color:rgba(255,255,255,.4);margin-bottom:16px;margin-top:32px;}
.char-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
.char-card{
  padding:14px 18px;border:1px solid rgba(255,255,255,.1);border-radius:4px;
  background:rgba(255,255,255,.03);cursor:pointer;min-width:130px;text-align:center;
  transition:all .2s;position:relative;
}
.char-card:hover,.char-card.selected{border-color:var(--gold);background:rgba(245,158,11,.08);transform:translateY(-2px);}
.char-card-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.char-card-desc{font-size:11px;color:rgba(255,255,255,.4);line-height:1.5;white-space:pre-line;}
.char-badge{position:absolute;top:-6px;right:-6px;font-size:9px;padding:2px 6px;border-radius:2px;background:rgba(34,211,238,.15);border:1px solid rgba(34,211,238,.3);color:var(--cyan);}
.legal-note{margin-top:24px;font-size:10px;color:rgba(255,255,255,.16);}
.true-end-hint{margin-top:16px;font-size:11px;color:var(--purple);letter-spacing:.05em;opacity:.7;display:none;}

/* -- CLEAR -- */
#clear-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:48px 24px;text-align:center;position:relative;z-index:10;
  animation:fadeUp .5s ease;
}
.clear-star{font-size:44px;color:var(--gold);margin-bottom:18px;animation:pulse 2s ease infinite;}
.clear-ep{font-size:10px;letter-spacing:.25em;color:rgba(255,255,255,.3);margin-bottom:8px;}
.clear-title{font-size:26px;font-weight:700;color:#fff;margin-bottom:22px;}
.clear-msg{font-size:13px;line-height:2;color:var(--cyan);margin-bottom:32px;white-space:pre-wrap;font-family:monospace;max-width:440px;}
.stats-grid{display:flex;gap:32px;margin-bottom:40px;}
.stat-card{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.5);}
.stat-val{font-size:26px;font-weight:700;}
.ending-label{font-size:11px;letter-spacing:.1em;padding:4px 14px;border-radius:2px;margin-bottom:28px;}
.clear-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

/* -- MODAL -- */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:250;
  align-items:center;justify-content:center;
  background:rgba(6,8,15,.8);backdrop-filter:blur(4px);
}
.modal-content{
  width:90%;max-width:520px;max-height:80vh;
  background:#0d1117;border:1px solid rgba(245,158,11,.2);border-radius:8px;
  display:flex;flex-direction:column;overflow:hidden;
  animation:fadeUp .3s ease;
}
.modal-tabs-wrap{display:flex;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.08);padding:0 4px;}
.modal-tab{
  flex-shrink:0;padding:10px 14px;font-size:11px;letter-spacing:.04em;
  background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;
  font-family:inherit;border-bottom:2px solid transparent;transition:all .15s;
}
.modal-tab:hover{color:rgba(255,255,255,.7);}
.modal-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.modal-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
.modal-empty{text-align:center;color:rgba(255,255,255,.3);padding:40px 0;font-size:13px;}
.modal-card{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
  border-radius:4px;transition:all .15s;
}
.modal-card.locked{opacity:.5;}
.modal-card.seolhwa-owned{border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.05);}
.modal-card-icon{font-size:24px;flex-shrink:0;width:36px;text-align:center;}
.modal-card-info{flex:1;min-width:0;}
.modal-card-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.modal-card-desc{font-size:11px;color:rgba(255,255,255,.4);line-height:1.5;}
.modal-card-btn{
  flex-shrink:0;padding:6px 12px;font-size:11px;
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);
  color:var(--gold);border-radius:3px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.modal-card-btn:hover{background:rgba(245,158,11,.2);}
.modal-card-btn.disabled{opacity:.3;cursor:not-allowed;}
.const-bar-wrap{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin:4px 0;}
.const-bar{height:100%;border-radius:2px;transition:width .5s;}
.modal-close-btn{
  padding:10px;text-align:center;font-size:12px;letter-spacing:.1em;
  background:none;border:none;border-top:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.4);cursor:pointer;font-family:inherit;transition:color .15s;
}
.modal-close-btn:hover{color:var(--gold);}

/* -- FOOTER -- */
#footer-bar{text-align:center;padding:12px;font-size:10px;color:rgba(255,255,255,.12);border-top:1px solid rgba(255,255,255,.05);position:relative;z-index:10;}

/* -- MOBILE -- */
@media(max-width:520px){
  #dialog-wrap{padding:18px 18px 14px;}
  #choices-wrap{padding:4px 18px 22px;}
  .char-cards{gap:8px;}
  .char-card{min-width:110px;padding:12px 14px;}
  #hud{padding:8px 12px;}
  .stat-track{width:28px;}
  .modal-content{width:95%;max-height:85vh;}
  .stats-grid{gap:20px;}
}
</style>
</head>
<body>

<div id="stars-layer"></div>

<!-- CONSTELLATION POPUP -->
<div id="constellation-popup">
  <div class="const-msg" id="const-msg"></div>
  <div class="const-coin" id="const-coin"></div>
  <div class="const-favor" id="const-favor"></div>
</div>

<!-- SEOLHWA POPUP -->
<div id="seolhwa-popup">
  <div class="seolhwa-popup-inner">
    <div class="seolhwa-popup-label">SEOLHWA ACQUIRED</div>
    <div class="seolhwa-popup-icon" id="seolhwa-popup-icon"></div>
    <div class="seolhwa-popup-name" id="seolhwa-popup-name"></div>
    <div class="seolhwa-popup-desc" id="seolhwa-popup-desc"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-content">
    <div class="modal-tabs-wrap" id="modal-tabs"></div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-close-btn" id="modal-close-btn">닫기</button>
  </div>
</div>

<div id="app">
  <!-- TITLE -->
  <div id="title-screen">
    <div class="title-label">OMNISCIENT READER'S VIEWPOINT</div>
    <div class="title-main">전지적<br>독자시점</div>
    <div class="title-en">팬 시뮬레이션 게임 v2.0</div>
    <div class="title-divider"></div>
    <div class="title-quote">나는 이 세계의 결말을 알고 있는<br>유일한 독자였다.</div>
    <div class="char-select-title">-- 플레이어블 캐릭터 선택 --</div>
    <div class="char-cards" id="char-cards"></div>
    <button class="orv-btn" id="start-btn">이야기 시작하기</button>
    <div class="true-end-hint" id="true-end-hint"></div>
    <div class="legal-note">팬게임 . 비상업 목적 제작 . 원작: 싱숑 작가 / 네이버시리즈</div>
  </div>

  <!-- GAME -->
  <div id="game-screen" style="display:none;flex-direction:column;flex:1;">
    <div id="hud">
      <div id="hud-left">ORV</div>
      <div id="ep-info">EP.1</div>
      <div id="hud-stats">
        <div id="hud-trust-pills"></div>
        <span class="seolhwa-tag" id="val-seolhwa">📜 0</span>
        <span class="coin-tag" id="val-coin">◈ 100</span>
        <button id="menu-btn">☰</button>
      </div>
    </div>
    <div id="main">
      <div id="scene-bg">
        <div class="bg-overlay bg-dark" id="bg-overlay"></div>
        <div class="scene-illus" id="scene-illus">📖</div>
      </div>
      <div id="dialog-wrap" onclick="skipTyping()">
        <div id="speaker-name"></div>
        <div id="dialog-text"></div>
        <div id="skip-hint">클릭하여 건너뛰기</div>
      </div>
      <div id="choices-wrap"></div>
    </div>
    <div id="footer-bar">전지적 독자시점 팬게임 . 원작: 싱숑</div>
  </div>

  <!-- CLEAR -->
  <div id="clear-screen">
    <div class="clear-star" id="clear-star">★</div>
    <div class="clear-ep" id="clear-ep-label">EPISODE 1</div>
    <div class="clear-title" id="clear-title">클리어!</div>
    <div class="clear-msg" id="clear-msg"></div>
    <div id="ending-badge" class="ending-label"></div>
    <div class="stats-grid">
      <div class="stat-card"><span style="color:var(--gold)">신뢰도</span><span class="stat-val" style="color:var(--gold)" id="final-trust">0</span></div>
      <div class="stat-card"><span style="color:var(--purple)">설화</span><span class="stat-val" style="color:var(--purple)" id="final-seolhwa">0</span></div>
      <div class="stat-card"><span style="color:var(--cyan)">코인</span><span class="stat-val" style="color:var(--cyan)" id="final-coin">100</span></div>
    </div>
    <div class="clear-buttons">
      <button class="orv-btn" id="next-ep-btn" style="display:none;">다음 에피소드 ▶</button>
      <button class="orv-btn" id="retry-btn">처음부터 다시</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/scenes.js"></script>
<script src="js/engine.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
