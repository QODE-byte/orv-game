<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전지적 독자시점 — 팬게임</title>
<meta name="description" content="나는 이 세계의 결말을 알고 있는 유일한 독자였다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f59e0b;--red:#ef4444;--purple:#a78bfa;--cyan:#22d3ee;
  --bg:#06080f;--text:#e0dbd2;--muted:rgba(255,255,255,.45);
}
html,body{
  width:100%;min-height:100vh;background:var(--bg);
  font-family:'Noto Serif KR','Malgun Gothic',serif;
  color:var(--text);overflow:hidden;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.45}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes constellationIn{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes constellationOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* -- LAYOUT -- */
#app{
  max-width:780px;margin:0 auto;
  min-height:100vh;display:flex;flex-direction:column;
  position:relative;
}
#stars-layer{
  position:fixed;inset:0;pointer-events:none;z-index:0;
}
.star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle 3s ease-in-out infinite;
}

/* -- HUD -- */
#hud{
  position:sticky;top:0;z-index:100;
  padding:10px 20px;
  background:linear-gradient(180deg,rgba(6,8,15,.98) 80%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(245,158,11,.1);
  min-height:44px;
}
#hud-left{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gold);letter-spacing:.08em;font-weight:700;}
#hud-stats{display:flex;align-items:center;gap:14px;}
.stat-pill{display:flex;align-items:center;gap:5px;font-size:10px;}
.stat-track{width:44px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;}
.stat-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.coin-tag{font-size:11px;padding:2px 9px;border:1px solid rgba(34,211,238,.3);border-radius:3px;background:rgba(34,211,238,.06);color:var(--cyan);}
#ep-info{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.1em;}

/* -- MAIN AREA -- */
#main{
  flex:1;display:flex;flex-direction:column;
  position:relative;z-index:10;
}
#scene-bg{
  flex:1;min-height:180px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.bg-overlay{
  position:absolute;inset:0;
  transition:background 1.2s ease;
}
.bg-subway{background:radial-gradient(ellipse 70% 50% at 50% 30%,#0a1628 0%,#06080f 65%);}
.bg-dark{background:radial-gradient(ellipse 70% 50% at 50% 30%,#1a0a2e 0%,#06080f 65%);}
.bg-city{background:radial-gradient(ellipse 70% 50% at 50% 30%,#1a1408 0%,#06080f 65%);}
.bg-battle{background:radial-gradient(ellipse 70% 50% at 50% 30%,#2e0a0a 0%,#06080f 65%);}
.bg-palace{background:radial-gradient(ellipse 70% 50% at 50% 30%,#1a0a2e 0%,#0f0520 65%);}
.bg-final{background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a1a3e 0%,#06080f 50%);}
.bg-clear{background:radial-gradient(ellipse 70% 50% at 50% 30%,#1a1a08 0%,#06080f 65%);}
.scene-illus{
  position:relative;z-index:1;
  text-align:center;padding:40px 24px;
  opacity:.18;font-size:72px;
  user-select:none;pointer-events:none;
  letter-spacing:.1em;
}

/* -- DIALOG -- */
#dialog-wrap{
  position:relative;z-index:10;
  border-top:1px solid rgba(245,158,11,.15);
  background:linear-gradient(180deg,rgba(6,8,15,.72) 0%,rgba(6,8,15,.97) 100%);
  padding:22px 26px 18px;
  cursor:pointer;min-height:164px;
}
#speaker-name{
  display:inline-flex;align-items:center;
  font-size:12px;font-weight:700;letter-spacing:.1em;
  padding:3px 12px;border:1px solid;border-radius:2px;
  margin-bottom:14px;background:rgba(0,0,0,.5);
  transition:color .3s,border-color .3s;
}
#dialog-text{
  font-size:15px;line-height:1.9;
  color:var(--text);white-space:pre-wrap;
  min-height:60px;transition:font-family .2s;
}
#cursor-blink{display:inline;animation:blink .7s step-end infinite;color:var(--gold);}
#skip-hint{
  font-size:10px;color:rgba(255,255,255,.16);
  text-align:right;margin-top:8px;letter-spacing:.05em;
  transition:opacity .3s;
}

/* -- CHOICES -- */
#choices-wrap{
  position:relative;z-index:10;
  padding:6px 26px 28px;
  background:rgba(6,8,15,.97);
  display:none;flex-direction:column;gap:8px;
}
.choice-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;text-align:left;
  padding:12px 16px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.1);
  border-radius:3px;
  color:#b5b0a8;font-size:14px;
  cursor:pointer;font-family:inherit;
  letter-spacing:.02em;
  transition:background .15s,border-color .15s,color .15s,transform .12s;
  animation:slideIn .25s ease both;
}
.choice-btn:hover{
  background:rgba(245,158,11,.1);
  border-color:var(--gold);
  color:#fcd34d;transform:translateX(5px);
}
.choice-arrow{color:var(--gold);font-size:10px;flex-shrink:0;}
.choice-fx{
  margin-left:auto;font-size:10px;
  color:rgba(255,255,255,.25);letter-spacing:.05em;flex-shrink:0;
}

/* -- CONSTELLATION POPUP -- */
#constellation-popup{
  display:none;
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  z-index:200;
  max-width:420px;width:90%;
  padding:14px 20px;
  background:linear-gradient(135deg,rgba(167,139,250,.15) 0%,rgba(34,211,238,.1) 100%);
  border:1px solid rgba(167,139,250,.3);
  border-radius:6px;
  backdrop-filter:blur(8px);
  animation:constellationIn .4s ease;
  text-align:center;
}
#constellation-popup.hiding{animation:constellationOut .3s ease forwards;}
.const-msg{font-size:12px;color:var(--purple);line-height:1.7;letter-spacing:.03em;}
.const-coin{font-size:11px;color:var(--cyan);margin-top:6px;}
.const-favor{font-size:10px;color:rgba(255,255,255,.3);margin-top:4px;}

/* -- TITLE -- */
#title-screen{
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;padding:48px 24px;text-align:center;
  position:relative;z-index:10;
  animation:fadeUp .6s ease;
}
.title-label{font-size:10px;letter-spacing:.35em;color:var(--gold);margin-bottom:14px;opacity:.75;}
.title-main{
  font-size:clamp(40px,9vw,72px);font-weight:900;
  line-height:1.08;color:#fff;margin-bottom:8px;
  letter-spacing:-.02em;
  text-shadow:0 0 80px rgba(245,158,11,.2);
}
.title-en{font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.28);margin-bottom:30px;}
.title-divider{width:40px;height:1px;background:rgba(245,158,11,.4);margin:0 auto 28px;}
.title-quote{
  font-size:14px;line-height:2;
  color:rgba(255,255,255,.5);margin-bottom:48px;font-style:italic;
}
.orv-btn{
  padding:13px 42px;background:transparent;
  border:1px solid var(--gold);color:var(--gold);
  font-size:13px;letter-spacing:.12em;cursor:pointer;
  border-radius:2px;font-family:inherit;
  transition:background .2s,box-shadow .2s,transform .1s;
}
.orv-btn:hover{background:rgba(245,158,11,.1);box-shadow:0 0 24px rgba(245,158,11,.18);}
.orv-btn:active{transform:scale(.98);}
.char-select-title{
  font-size:12px;letter-spacing:.12em;color:rgba(255,255,255,.4);
  margin-bottom:16px;margin-top:32px;
}
.char-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
.char-card{
  padding:14px 18px;border:1px solid rgba(255,255,255,.1);
  border-radius:4px;background:rgba(255,255,255,.03);
  cursor:pointer;min-width:130px;text-align:center;
  transition:all .2s;position:relative;
}
.char-card:hover,.char-card.selected{
  border-color:var(--gold);background:rgba(245,158,11,.08);
  transform:translateY(-2px);
}
.char-card-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.char-card-desc{font-size:11px;color:rgba(255,255,255,.4);line-height:1.5;}
.char-badge{
  position:absolute;top:-6px;right:-6px;
  font-size:9px;padding:2px 6px;border-radius:2px;
  background:rgba(34,211,238,.15);border:1px solid rgba(34,211,238,.3);
  color:var(--cyan);letter-spacing:.05em;
}
.legal-note{margin-top:24px;font-size:10px;color:rgba(255,255,255,.16);letter-spacing:.04em;}
.true-end-hint{
  margin-top:16px;font-size:11px;color:var(--purple);
  letter-spacing:.05em;opacity:.7;
  display:none;
}

/* -- CLEAR SCREEN -- */
#clear-screen{
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;padding:48px 24px;text-align:center;
  position:relative;z-index:10;
  animation:fadeUp .5s ease;
}
.clear-star{font-size:44px;color:var(--gold);margin-bottom:18px;animation:pulse 2s ease infinite;}
.clear-ep{font-size:10px;letter-spacing:.25em;color:rgba(255,255,255,.3);margin-bottom:8px;}
.clear-title{font-size:26px;font-weight:700;color:#fff;margin-bottom:22px;}
.clear-msg{
  font-size:13px;line-height:2;color:var(--cyan);
  margin-bottom:32px;white-space:pre-wrap;font-family:monospace;
  max-width:440px;
}
.stats-grid{display:flex;gap:32px;margin-bottom:40px;}
.stat-card{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.5);}
.stat-val{font-size:26px;font-weight:700;}
.ending-label{
  font-size:11px;letter-spacing:.1em;
  padding:4px 14px;border-radius:2px;
  margin-bottom:28px;
}
.clear-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

/* -- FOOTER -- */
#footer-bar{
  text-align:center;padding:12px;
  font-size:10px;color:rgba(255,255,255,.12);
  border-top:1px solid rgba(255,255,255,.05);
  letter-spacing:.04em;position:relative;z-index:10;
}

/* -- MOBILE -- */
@media(max-width:520px){
  #dialog-wrap{padding:18px 18px 14px;}
  #choices-wrap{padding:4px 18px 22px;}
  .char-cards{gap:8px;}
  .char-card{min-width:110px;padding:12px 14px;}
  #hud{padding:8px 14px;}
  #constellation-popup{max-width:92%;top:50px;}
  .stats-grid{gap:20px;}
}
</style>
</head>
<body>

<div id="stars-layer"></div>

<div id="app">
  <!-- CONSTELLATION POPUP -->
  <div id="constellation-popup">
    <div class="const-msg" id="const-msg"></div>
    <div class="const-coin" id="const-coin"></div>
    <div class="const-favor" id="const-favor"></div>
  </div>

  <!-- TITLE -->
  <div id="title-screen">
    <div class="title-label">OMNISCIENT READER'S VIEWPOINT</div>
    <div class="title-main">전지적<br>독자시점</div>
    <div class="title-en">팬 시뮬레이션 게임</div>
    <div class="title-divider"></div>
    <div class="title-quote">나는 이 세계의 결말을 알고 있는<br>유일한 독자였다.</div>
    <div class="char-select-title">-- 플레이어블 캐릭터 선택 --</div>
    <div class="char-cards" id="char-cards"></div>
    <button class="orv-btn" id="start-btn">이야기 시작하기</button>
    <div class="true-end-hint" id="true-end-hint">모든 캐릭터 클리어 시 진 엔딩 해금</div>
    <div class="legal-note">팬게임 . 비상업 목적 제작 . 원작: 싱숑 작가 / 네이버시리즈</div>
  </div>

  <!-- GAME -->
  <div id="game-screen" style="display:none;flex-direction:column;flex:1;">
    <!-- HUD -->
    <div id="hud">
      <div id="hud-left">ORV</div>
      <div id="ep-info">EP.1</div>
      <div id="hud-stats">
        <div class="stat-pill">
          <span style="color:var(--gold);font-size:10px">신뢰도</span>
          <div class="stat-track"><div class="stat-fill" id="bar-trust" style="background:var(--gold);box-shadow:0 0 4px #f59e0b66"></div></div>
          <span style="color:var(--gold);font-size:10px" id="val-trust">0</span>
        </div>
        <div class="stat-pill">
          <span style="color:var(--purple);font-size:10px">설화</span>
          <div class="stat-track"><div class="stat-fill" id="bar-seolhwa" style="background:var(--purple);box-shadow:0 0 4px #a78bfa66"></div></div>
          <span style="color:var(--purple);font-size:10px" id="val-seolhwa">0</span>
        </div>
        <div class="coin-tag" id="val-coin">◈ 100</div>
      </div>
    </div>

    <!-- MAIN -->
    <div id="main">
      <div id="scene-bg">
        <div class="bg-overlay bg-dark" id="bg-overlay"></div>
        <div class="scene-illus" id="scene-illus">📖</div>
      </div>
      <div id="dialog-wrap" onclick="skipTyping()">
        <div id="speaker-name"></div>
        <div id="dialog-text"></div>
        <div id="skip-hint">클릭하여 건너뛰기</div>
      </div>
      <div id="choices-wrap"></div>
    </div>
    <div id="footer-bar">전지적 독자시점 팬게임 . 원작: 싱숑</div>
  </div>

  <!-- CLEAR -->
  <div id="clear-screen">
    <div class="clear-star">★</div>
    <div class="clear-ep" id="clear-ep-label">EPISODE 1</div>
    <div class="clear-title" id="clear-title">클리어!</div>
    <div class="clear-msg" id="clear-msg"></div>
    <div id="ending-badge" class="ending-label"></div>
    <div class="stats-grid">
      <div class="stat-card"><span style="color:var(--gold)">신뢰도</span><span class="stat-val" style="color:var(--gold)" id="final-trust">0</span></div>
      <div class="stat-card"><span style="color:var(--purple)">설화</span><span class="stat-val" style="color:var(--purple)" id="final-seolhwa">0</span></div>
      <div class="stat-card"><span style="color:var(--cyan)">코인</span><span class="stat-val" style="color:var(--cyan)" id="final-coin">100</span></div>
    </div>
    <div class="clear-buttons">
      <button class="orv-btn" id="next-ep-btn" style="display:none;">다음 에피소드 ▶</button>
      <button class="orv-btn" id="retry-btn">처음부터 다시</button>
    </div>
  </div>
</div>

<script>
// =======================================
// DATA
// =======================================
const CHARS = {
  dokja:     { name:'김독자',   col:'#f59e0b', desc:'유일한 독자\n전략형 . 제4의 벽',  illus:'📖', style:'전략/메타' },
  joonghyuk: { name:'유중혁',   col:'#ef4444', desc:'회귀자\n전투형 . 압도적 무력', illus:'⚔️', style:'전투/독주' },
  sooyoung:  { name:'한수영',   col:'#a78bfa', desc:'천재 작가\n설화형 . 이야기 무기화', illus:'✒️', style:'설화/창작' },
};

// --- CONSTELLATION MESSAGES ---
const CONSTELLATIONS = [
  {msg:'성좌 「비밀 수렵자」가 당신의 선택을 흥미롭게 지켜봅니다.', coin:0},
  {msg:'성좌 「지독한 평론가」가 코인을 후원합니다.', coin:15},

  {msg:'성좌 「끝까지 보는 자」가 격렬히 응원합니다.', coin:10},

  {msg:'성좌 「어둠의 재판관」이 판결을 내립니다.', coin:5},
  {msg:'성좌 「디펜스 마스터」가 당신의 전략을 높이 평가합니다.', coin:20},
  {msg:'성좌 「심연의 흑염룡」이 조용히 웃습니다.', coin:0},
  {msg:'성좌 「처음부터 보던 자」가 눈물을 흘립니다.', coin:10},
  {msg:'성좌 「전지적 독자시점」이 이 이야기를 기록합니다.', coin:25},
  {msg:'성좌 「양심적 징병거부자」가 평화를 바랍니다.', coin:5},
  {msg:'성좌 「가장 오래된 꿈」이 당신을 바라봅니다.', coin:30},
];

// =======================================
// SCENES: 김독자
// =======================================
const SCENES_DOKJA = {
  // === EP.1: 지하철 ===
  s0:{sp:'narrator',illus:'🚃',bg:'subway',
    txt:'2026년 3월 28일. 퇴근길 불광행 지하철 3807칸.\n\n나는 오늘도 소설을 읽고 있었다.',
    ch:[{t:'계속하기 ▶',n:'s1',fx:{}}]},
  s1:{sp:'dokja',illus:'📱',bg:'subway',
    txt:'《멸망한 세계에서 살아남는 세 가지 방법》\n\n3149화.  完.\n\n14년. 드디어 끝났다.',

    txt:'작가 tls123. 나만 알아봐 주던 그 소설이.\n\n이제 진짜 끝이 났다.\n\n...... 고마웠어.',
    ch:[{t:'계속하기 ▶',n:'s3',fx:{}}]},
  s3:{sp:'system',illus:'⚡',bg:'dark',
    txt:'【 스타 스트림에 오신 것을 환영합니다 】\n\n【 유료 서비스가 시작됩니다 】\n\n【 생존자에게 코인이 지급됩니다 】',
    ch:[{t:'......?',n:'s4',fx:{}}]},
  s4:{sp:'narrator',illus:'🌌',bg:'dark',
    txt:'하나의 세계가 멸망하고, 새로운 세계가 태어나고 있었다.\n\n그리고 나는 이 세계의 결말을 알고 있는 유일한 독자였다.',
    ch:[{t:'【제4의 벽】을 세운다',n:'s5',fx:{seolhwa:5}}]},
  s5:{sp:'dokja',illus:'🧱',bg:'dark',
    txt:'【제4의 벽】 발동.\n\n공황이 오지 않는다. 나는 이 이야기를 알고 있다.\n\n멸살법 1화. 정확히 이 순간이었다.',

  s6:{sp:'narrator',illus:'👤',bg:'dark',
    txt:'지하철 반대편 끝.\n\n흑발의 남자가 홀로 서 있었다.\n\n압도적인 존재감. 세상이 끝났는데도 흔들리지 않는 눈빛.',

  s7:{sp:'joonghyuk',illus:'⚔️',bg:'dark',
    txt:'물러서.',
    ch:[
      {t:'그에게 다가간다',           n:'s8a',fx:{trust:10},   hint:'+신뢰도 10'},

// =======================================
// STATE
// =======================================
let state = {
  phase: 'title',
  char: 'dokja',
  scenes: SCENES_DOKJA,
  sceneId: 's0',
  ep: 1,
  stats: { trust:0, seolhwa:0, coin:100 },
  constellation: 0,
  solitaryCount: 0,
  dispTxt: '',
  typing: false,
  choicesOn: false,
  lastClear: null,
};
let typingTimer = null;
let constTimer = null;

// Persistent completion data
function getSaveData() {
  try { return JSON.parse(localStorage.getItem('orv_save') || '{}'); } catch(e) { return {}; }
}
function setSaveData(d) {
  try { localStorage.setItem('orv_save', JSON.stringify(d)); } catch(e) {}
}

// =======================================
// INIT
// =======================================
function init() {
  buildStars();
  buildCharCards();
  showScreen('title');
  checkTrueEndHint();

  document.getElementById('start-btn').onclick = startGame;
  document.getElementById('retry-btn').onclick = () => { showScreen('title'); checkTrueEndHint(); buildCharCards(); };
  document.getElementById('next-ep-btn').onclick = continueNextEp;
}

function buildStars() {
  const layer = document.getElementById('stars-layer');
  layer.innerHTML = '';
  for (let i=0; i<24; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.5+0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*4}s;opacity:0.15`;
    layer.appendChild(s);
  }
}

function buildCharCards() {
  const wrap = document.getElementById('char-cards');
  wrap.innerHTML = '';
  const save = getSaveData();
  Object.entries(CHARS).forEach(([id, ch]) => {
    const card = document.createElement('div');
    card.className = 'char-card' + (id === state.char ? ' selected' : '');
    card.dataset.id = id;
    const completed = save[id] && save[id].completed;
    card.innerHTML = `
      <div style="font-size:28px;margin-bottom:8px">${ch.illus}</div>
      <div class="char-card-name" style="color:${ch.col}">${ch.name}</div>
      <div class="char-card-desc">${ch.desc}</div>
      ${completed ? '<div class="char-badge">CLEAR</div>' : ''}
    `;
    card.onclick = () => {
      document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      state.char = id;
    };
    wrap.appendChild(card);
  });
}

function checkTrueEndHint() {
  const save = getSaveData();
  const allDone = ['dokja','joonghyuk','sooyoung'].every(c => save[c] && save[c].completed && save[c].trust >= 70);
  const hint = document.getElementById('true-end-hint');
  if (allDone) {
    hint.style.display = 'block';
    hint.textContent = '★ 진 엔딩 해금! 아무 캐릭터로 시작하세요 ★';
    hint.style.color = '#fcd34d';
  } else {
    const cleared = ['dokja','joonghyuk','sooyoung'].filter(c => save[c] && save[c].completed && save[c].trust >= 70).length;
    if (cleared > 0) {
      hint.style.display = 'block';
      hint.textContent = `진 엔딩 조건: ${cleared}/3 캐릭터 클리어 (신뢰도 70+)`;
    } else {
      hint.style.display = 'none';
    }
  }
}

function showScreen(screen) {
  document.getElementById('title-screen').style.display = screen==='title' ? 'flex' : 'none';
  document.getElementById('game-screen').style.display  = screen==='game'  ? 'flex' : 'none';
  document.getElementById('clear-screen').style.display = screen==='clear' ? 'flex' : 'none';
}

// =======================================
// GAME
// =======================================
function startGame() {
  state.scenes  = ALL_SCENES[state.char];
  state.sceneId = 's0';
  state.ep      = 1;
  state.stats   = { trust:0, seolhwa:0, coin:100 };
  state.constellation = 0;
  state.solitaryCount = 0;
  state.phase   = 'game';
  state.lastClear = null;
  showScreen('game');
  updateEpInfo();
  loadScene('s0');
}

function continueNextEp() {
  if (!state.lastClear || !state.lastClear.next) return;
  const nextScene = state.lastClear.next;
  state.ep++;
  state.phase = 'game';
  showScreen('game');
  updateEpInfo();
  loadScene(nextScene);
}

function updateEpInfo() {
  document.getElementById('ep-info').textContent = 'EP.' + state.ep;
  document.getElementById('footer-bar').textContent = `전지적 독자시점 팬게임 . EP.${state.ep} . 원작: 싱숑`;
}

function loadScene(id) {
  if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }

  state.sceneId   = id;
  state.dispTxt   = '';
  state.typing    = true;
  state.choicesOn = false;

  const sc = state.scenes[id];
  if (!sc) return;

  // Speaker name
  const nameEl = document.getElementById('speaker-name');
  const spMap = {
    dokja:    {name:'김독자',  col:'#f59e0b'},
    joonghyuk:{name:'유중혁',  col:'#ef4444'},
    sooyoung: {name:'한수영',  col:'#a78bfa'},
    narrator: {name:'',       col:'#94a3b8'},
    system:   {name:'SYSTEM', col:'#22d3ee'},
  };
  const spInfo = spMap[sc.sp] || spMap.narrator;
  if (spInfo.name) {
    const label = sc.sp==='system' ? `【 ${spInfo.name} 】` : spInfo.name;
    nameEl.textContent = label;
    nameEl.style.display = 'inline-flex';
    nameEl.style.color = spInfo.col;
    nameEl.style.borderColor = spInfo.col+'55';
  } else {
    nameEl.style.display = 'none';
  }

  // Scene illus & bg
  document.getElementById('scene-illus').textContent = sc.illus || '📖';
  const overlay = document.getElementById('bg-overlay');
  overlay.className = 'bg-overlay bg-' + (sc.bg || 'dark');

  const isSystem = sc.sp === 'system';
  document.getElementById('dialog-text').style.fontFamily = isSystem ? "'Courier New',monospace" : "'Noto Serif KR',serif";
  document.getElementById('dialog-text').style.color = isSystem ? '#22d3ee' : '#e0dbd2';

  // Hide choices
  const cw = document.getElementById('choices-wrap');
  cw.style.display = 'none';
  cw.innerHTML = '';

  // Typing
  document.getElementById('skip-hint').style.opacity = '1';
  const full = sc.txt;
  let i = 0;
  typingTimer = setInterval(() => {
    i++;
    state.dispTxt = full.slice(0, i);
    renderText();
    if (i >= full.length) {
      clearInterval(typingTimer); typingTimer = null;
      state.typing = false;
      state.choicesOn = true;
      document.getElementById('skip-hint').style.opacity = '0';
      showChoices();
    }
  }, 26);

  updateHUD();

  // Constellation popup chance
  maybeShowConstellation();
}

function renderText() {
  const el = document.getElementById('dialog-text');
  const lines = state.dispTxt.split('\n');
  let html = lines.map((l,i)=>l+(i<lines.length-1?'<br>':'')).join('');
  if (state.typing) html += '<span id="cursor-blink">|</span>';
  el.innerHTML = html;
}

function skipTyping() {
  if (!state.typing) return;
  if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
  const sc = state.scenes[state.sceneId];
  state.dispTxt = sc.txt;
  state.typing = false;
  state.choicesOn = true;
  document.getElementById('skip-hint').style.opacity = '0';
  renderText();
  showChoices();
}

function showChoices() {
  const sc = state.scenes[state.sceneId];
  if (!sc || sc.ch.length === 0) return;
  const cw = document.getElementById('choices-wrap');
  cw.innerHTML = '';
  sc.ch.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.style.animationDelay = `${i*0.07}s`;
    btn.innerHTML = `<span class="choice-arrow">▷</span>${c.t}${c.hint?`<span class="choice-fx">${c.hint}</span>`:''}`;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      handleChoice(c);
    });
    cw.appendChild(btn);
  });
  cw.style.display = 'flex';
}

function handleChoice(choice) {
  if (choice.fx) {
    const f = choice.fx;
    state.stats.trust   = Math.min(100, Math.max(0, state.stats.trust   + (f.trust   ||0)));
    state.stats.seolhwa = Math.min(100, Math.max(0, state.stats.seolhwa + (f.seolhwa ||0)));
    state.stats.coin    = Math.max(0,               state.stats.coin    + (f.coin    ||0));
  }

  // Track solitary choices
  if (choice.t.includes('혼자') || choice.t.includes('모른 척') || choice.t.includes('거리를 유지') || choice.t.includes('앞서 나간다') || choice.t.includes('기억을 잠근다')) {
    state.solitaryCount++;
  }

  updateHUD();
  const next = state.scenes[choice.n];
  if (next && next.clr) {
    goToClear(choice.n, next);
  } else if (next) {
    loadScene(choice.n);
  }
}

// =======================================
// CLEAR / ENDING
// =======================================
function goToClear(id, sc) {
  if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
  if (constTimer) { clearTimeout(constTimer); constTimer = null; }

  state.lastClear = sc;

  // Check for bad ending
  if (state.solitaryCount >= 5 && sc.ep === 5) {
    showSpecialEnding(BAD_ENDING, 'BAD');
    return;
  }

  // Check for true ending
  if (sc.ep === 5) {
    // Save completion data
    const save = getSaveData();
    save[state.char] = { completed: true, trust: state.stats.trust };
    setSaveData(save);

    const allDone = ['dokja','joonghyuk','sooyoung'].every(c => save[c] && save[c].completed && save[c].trust >= 70);
    if (allDone && state.stats.trust >= 70) {
      showSpecialEnding(TRUE_ENDING, 'TRUE');
      return;
    }
  }

  document.getElementById('final-trust').textContent   = state.stats.trust;
  document.getElementById('final-seolhwa').textContent = state.stats.seolhwa;
  document.getElementById('final-coin').textContent    = state.stats.coin;
  document.getElementById('clear-msg').textContent     = sc.txt;
  const badge = document.getElementById('ending-badge');
  badge.textContent = sc.badge || '';
  badge.style.background = (sc.col||'#f59e0b') + '22';
  badge.style.color = sc.col || '#f59e0b';
  badge.style.border = '1px solid ' + (sc.col||'#f59e0b') + '66';
  document.getElementById('clear-title').textContent = sc.ending || '클리어!';

  // Dynamic EP label
  const epLabel = sc.ep ? `EPISODE ${sc.ep}` : 'EPISODE 1';
  document.getElementById('clear-ep-label').textContent = epLabel;

  // Show/hide next episode button
  const nextBtn = document.getElementById('next-ep-btn');
  if (sc.next) {
    nextBtn.style.display = 'inline-block';
    nextBtn.textContent = `Episode ${(sc.ep||1)+1} 시작 ▶`;
  } else {
    nextBtn.style.display = 'none';
  }

  showScreen('clear');
}

function showSpecialEnding(ending, type) {
  document.getElementById('final-trust').textContent   = state.stats.trust;
  document.getElementById('final-seolhwa').textContent = state.stats.seolhwa;
  document.getElementById('final-coin').textContent    = state.stats.coin;
  document.getElementById('clear-msg').textContent     = ending.txt;

  const badge = document.getElementById('ending-badge');
  badge.textContent = ending.badge;
  badge.style.background = ending.col + '22';
  badge.style.color = ending.col;
  badge.style.border = '1px solid ' + ending.col + '66';

  document.getElementById('clear-title').textContent = type === 'TRUE' ? '진 엔딩' : '배드 엔딩';
  document.getElementById('clear-ep-label').textContent = type === 'TRUE' ? 'TRUE ENDING' : 'BAD ENDING';
  document.getElementById('clear-star').textContent = type === 'TRUE' ? '★' : '☆';
  document.getElementById('next-ep-btn').style.display = 'none';

  showScreen('clear');
}

// =======================================
// CONSTELLATION SYSTEM
// =======================================
function maybeShowConstellation() {
  if (Math.random() > 0.3) return; // 30% chance
  const popup = document.getElementById('constellation-popup');
  const c = CONSTELLATIONS[Math.floor(Math.random() * CONSTELLATIONS.length)];

  document.getElementById('const-msg').textContent = c.msg;
  if (c.coin > 0) {
    state.stats.coin += c.coin;
    state.constellation += 5;
    document.getElementById('const-coin').textContent = `+${c.coin} 코인 후원`;
    document.getElementById('const-coin').style.display = 'block';
    updateHUD();
  } else {
    document.getElementById('const-coin').style.display = 'none';
    state.constellation += 2;
  }
  document.getElementById('const-favor').textContent = `성좌 호감도: ${state.constellation}`;

  popup.classList.remove('hiding');
  popup.style.display = 'block';

  if (constTimer) clearTimeout(constTimer);
  constTimer = setTimeout(() => {
    popup.classList.add('hiding');
    setTimeout(() => { popup.style.display = 'none'; popup.classList.remove('hiding'); }, 300);
  }, 2800);
}

// =======================================
// HUD
// =======================================
function updateHUD() {
  document.getElementById('bar-trust').style.width   = state.stats.trust + '%';
  document.getElementById('bar-seolhwa').style.width = state.stats.seolhwa + '%';
  document.getElementById('val-trust').textContent   = state.stats.trust;
  document.getElementById('val-seolhwa').textContent = state.stats.seolhwa;
  document.getElementById('val-coin').textContent    = '◈ ' + state.stats.coin;
}

// expose skipTyping globally (called from onclick)
window.skipTyping = skipTyping;

init();
</script>
